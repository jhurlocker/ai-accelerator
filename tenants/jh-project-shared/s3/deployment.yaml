# RUSTFS S3 Object Storage Deployment
# Reference deployment: oc get deployment rustfs -n rustfs -o yaml
#
# Key differences from previous Helm-generated manifests:
# - Uses `app: rustfs` labels (matching upstream chart default)
# - Split services: `rustfs-s3` (API) and `rustfs-console` (web UI)
# - Single PVC: `rustfs-data` (no separate logs PVC)
# - Image: docker.io/rustfs/rustfs:latest
# - Security: runAsUser from SA-based UID (SCC managed), not hardcoded
# - Health probe: /health (native RUSTFS endpoint)
#
# Apply: oc apply -k .

apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: rustfs
  name: rustfs
  namespace: jh-project-shared
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: rustfs
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: rustfs
    spec:
      serviceAccountName: rustfs
      containers:
      - env:
        - name: RUSTFS_VOLUMES
          value: /data
        - name: RUSTFS_ADDRESS
          value: 0.0.0.0:9000
        - name: RUSTFS_CONSOLE_ADDRESS
          value: 0.0.0.0:9001
        - name: RUSTFS_CONSOLE_ENABLE
          value: "true"
        - name: RUSTFS_CORS_ALLOWED_ORIGINS
          value: '*'
        - name: RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS
          value: '*'
        - name: RUSTFS_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              key: RUSTFS_ACCESS_KEY
              name: rustfs-credentials
        - name: RUSTFS_SECRET_KEY
          valueFrom:
            secretKeyRef:
              key: RUSTFS_SECRET_KEY
              name: rustfs-credentials
        image: docker.io/rustfs/rustfs:latest
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: 9000
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 1
        name: rustfs
        ports:
        - containerPort: 9000
          name: s3
          protocol: TCP
        - containerPort: 9001
          name: console
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: 9000
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /data
          name: data
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: rustfs-data
