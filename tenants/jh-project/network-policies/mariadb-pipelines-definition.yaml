apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  annotations:
    manifestival: new
  labels:
    dsp-version: v2
  name: mariadb-pipelines-definition
  namespace: jh-project
spec:
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: redhat-ods-applications
      podSelector:
        matchLabels:
          app.kubernetes.io/name: data-science-pipelines-operator
    - podSelector:
        matchLabels:
          app: ds-pipeline-pipelines-definition
          component: data-science-pipelines
    - podSelector:
        matchLabels:
          app: ds-pipeline-metadata-grpc-pipelines-definition
          component: data-science-pipelines
    ports:
    - port: 3306
      protocol: TCP
  podSelector:
    matchLabels:
      app: mariadb-pipelines-definition
      component: data-science-pipelines
  policyTypes:
  - Ingress
