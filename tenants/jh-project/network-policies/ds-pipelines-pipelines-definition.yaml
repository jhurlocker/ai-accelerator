apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  annotations:
    manifestival: new
  labels:
    dsp-version: v2
  name: ds-pipelines-pipelines-definition
  namespace: jh-project
spec:
  ingress:
  - ports:
    - port: 8443
      protocol: TCP
  - from:
    - namespaceSelector:
        matchLabels:
          name: openshift-user-workload-monitoring
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: redhat-ods-monitoring
    - podSelector:
        matchLabels:
          app: ds-pipeline-pipelines-definition
          component: data-science-pipelines
    - podSelector:
        matchLabels:
          app: mariadb-pipelines-definition
          component: data-science-pipelines
    - podSelector:
        matchLabels:
          app: minio-pipelines-definition
          component: data-science-pipelines
    - podSelector:
        matchLabels:
          app: ds-pipeline-persistenceagent-pipelines-definition
          component: data-science-pipelines
    - podSelector:
        matchLabels:
          app: ds-pipeline-scheduledworkflow-pipelines-definition
          component: data-science-pipelines
    - podSelector:
        matchLabels:
          app: ds-pipeline-metadata-envoy-pipelines-definition
          component: data-science-pipelines
    - podSelector:
        matchLabels:
          app: ds-pipeline-metadata-grpc-pipelines-definition
          component: data-science-pipelines
    - podSelector:
        matchLabels:
          pipelines.kubeflow.org/v2_component: 'true'
    - podSelector:
        matchLabels:
          opendatahub.io/workbenches: 'true'
    ports:
    - port: 8888
      protocol: TCP
    - port: 8887
      protocol: TCP
  podSelector:
    matchLabels:
      app: ds-pipeline-pipelines-definition
      component: data-science-pipelines
  policyTypes:
  - Ingress
