apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  annotations:
    manifestival: new
  labels:
    dsp-version: v2
  name: ds-pipelines-envoy-pipelines-definition
  namespace: jh-project
spec:
  ingress:
  - ports:
    - port: 8443
      protocol: TCP
  - from:
    - podSelector:
        matchLabels:
          component: data-science-pipelines
    ports:
    - port: 9090
      protocol: TCP
  podSelector:
    matchLabels:
      app: ds-pipeline-metadata-envoy-pipelines-definition
      component: data-science-pipelines
  policyTypes:
  - Ingress
